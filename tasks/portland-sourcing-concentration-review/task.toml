schema_version = "1.1"

[task]
name = "ops/portland-sourcing-concentration-review"
description = "Build a sourcing concentration review from an Open Contracting-derived purchase slice, requiring Kraljic segmentation, sourcing strategy, and procurement risk mapping."
authors = [{ name = "OpsSkillsBench", email = "support@example.com" }]
keywords = ["operations", "procurement", "supplier-management", "public-contracting", "audit"]

[metadata]
domain = "operations-management"
difficulty = "hard"
status = "runnable_external_source"
dataset_sources = ["open-contracting-portland"]
skill_candidates = ["supply-chain-manager", "operations-manager", "procurement-review"]
expected_outputs = ["/app/output/kraljic_category_matrix.csv", "/app/output/supplier_action_plan.csv", "/app/output/procurement_risk_register.json"]
source_note = "Runnable deterministic slice is derived from the City of Portland Open Contracting CSV package via scripts/preprocess/build_portland_sourcing_concentration.py."

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 1024
allow_internet = false
skills_dir = "/opt/skills"
