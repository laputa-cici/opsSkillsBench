schema_version = "1.1"

[task]
name = "ops/online-retail-replenishment-review"
description = "Build a SKU replenishment review from Online Retail II-derived demand history and local inventory policies."
authors = [{ name = "OpsSkillsBench", email = "support@example.com" }]
keywords = ["operations", "inventory", "replenishment", "retail", "supply-chain"]

[metadata]
domain = "operations-management"
difficulty = "medium"
status = "runnable_smoke_not_skill_sensitive"
dataset_sources = ["uci-online-retail-ii"]
provided_skills = ["supply-chain-manager"]
skill_candidates = ["demand-forecasting"]
expected_outputs = ["/app/output/replenishment_plan.csv", "/app/output/replenishment_exceptions.json"]
pilot_finding = "Agents solved this as script-based CSV processing under both no_skill and provided_skills; keep as runner smoke test, not paper-facing skill benchmark."

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 1024
allow_internet = false
skills_dir = "/opt/skills"
