schema_version = "1.1"

[task]
name = "ops/dataco-control-tower-exception-review"
description = "Build a control-tower exception review from a DataCo-derived order snapshot, requiring delivery risk triage, lane scorecards, and framework-based action mapping."
authors = [{ name = "OpsSkillsBench", email = "support@example.com" }]
keywords = ["operations", "logistics", "delivery-risk", "fulfillment", "supply-chain"]

[metadata]
domain = "operations-management"
difficulty = "hard"
status = "runnable_external_source"
dataset_sources = ["dataco-smart-supply-chain"]
skill_candidates = ["supply-chain-manager", "logistics-manager", "operations-manager"]
expected_outputs = ["/app/output/control_tower_actions.csv", "/app/output/lane_risk_register.json", "/app/output/scorecard_summary.json"]
source_note = "Runnable deterministic slice is derived from the raw DataCo SMART Supply Chain CSV via scripts/preprocess/build_dataco_control_tower.py."

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 1024
allow_internet = false
skills_dir = "/opt/skills"
